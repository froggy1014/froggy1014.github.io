<section class="archive">
    <h1>Recent Post</h1>
    <hr />
    <div class="entries-list">
    {% for post in site.posts | limit:5 %}
    <div class="{{ include.type | default: 'list' }}__item">
        <article class="archive__item" itemscope itemtype="https://schema.org/CreativeWork">
         
          <img width="20" height="20" src="/assets/logo/{{ post.prefix }}.svg" />
          <span class="archive__item-title no_toc" itemprop="headline">
              <a class="archive__post-title" href="{{ post.url | relative_url }}" rel="permalink">{{ post.title }}</a>
          </span>
        </article>
    </div>
    {% endfor %}
    </div>
</section>
